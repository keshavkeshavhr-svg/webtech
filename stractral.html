<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1:first-child{
        background-color: blueviolet;
    }
    h1:last-child{
        background-color: black;
    }
    h1:nth-child(odd){
        background-color: aquamarine;
    }
    h1:first-of-type{
        color: blue;
    }
    h1:last-of-type{
        color: azure;
    }
</style>
<body>
    <div>
        <h1>king</h1>
        <h1>boss</h1>
        <h1>ring</h1>
        <h1>dog</h1>
    </div>
</body>
</html>
