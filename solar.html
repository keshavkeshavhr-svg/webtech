<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    padding:0;
    box-sizing: border-box;
} 


#solar {
    height: 100vh;
    
    display: flex;
    justify-content:space-evenly;
    align-items: center; 
    background-size: cover;
    background-image: url("https://cdn.hswstatic.com/gif/gettyimages-139494347.jpg");
   
    
}
#sun{
   height:130px;
   width:130px;
   
   border-radius: 50%;
    background-size:cover;
    background-image: url("https://static.vecteezy.com/system/resources/thumbnails/049/667/553/small/sun-s-fiery-surface-with-transparent-background-a-glowing-celestial-body-with-intricate-details-png.png");
    
}
#p1{
    height:40px;
    width:40px;
    position: relative;
    top:20px;
    border-radius: 50%;
    background-image: url("https://nineplanets.org/wp-content/uploads/2020/03/mercury.png");
    background-size:cover;
    animation:spining 1s linear 0s infinite normal
}
@keyframes rotating{
    from{
       rotate:0deg
    }
    to{
        rotate:360deg
    }
    
}
#mercury{
    height:200px;
   width:200px;
   border:2px solid white;
   position:absolute;
   border-radius: 50%;
    animation:rotating 15s linear 0s infinite normal 
    
   
   


}
#vinus{
    height:300px;
   width:300px;
   border:2px solid white;
   position:absolute;
   border-radius: 50%;
   animation:rotating  20s linear 0s infinite normal 
    
   
   


}
#p2{
    height:40px;
    width:40px;
    position: relative;
     top:45px;
     border-radius: 50%;
     background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcST5XtRjx0Xxgw00PeB-sPACw2aNaWG0tGIgA&s");
    background-size: cover;
    animation:spining 1s linear 0s infinite normal
}
#earth{
    height:400px;
   width:400px;
   border:2px dotted white;
   position:absolute;
   border-radius: 50% ;
   animation:rotating 25s linear 0s infinite normal 
    
   
   


}
#p3{
    height:40px;
    width:40px;
    position: relative;
    top:75px;
    border-radius: 50%;
    background-image: url("https://thumbs.dreamstime.com/b/planet-earth-transparent-background-d-render-isolated-additional-file-high-quality-texture-realistic-70169166.jpg");
    background-size: cover;
    animation:spining 2s linear 0s infinite normal
}
#mars{
    height:500px;
   width:500px;
   border:2px solid white;
   position:absolute;
   border-radius: 50%;
   animation:rotating 28s linear 0s infinite normal 
    
   
   


}
#p4{
    height:40px;
    width:40px;
    position: relative;
    top:120px;
    border-radius: 50%;
    background-image: url("https://p1.hiclipart.com/preview/838/865/89/solar-system-earth-mars-planet-jupiter-terrestrial-planet-terraforming-sun-png-clipart.jpg");
    background-size: cover;
    animation:spining 1s linear 0s infinite normal
}
#jupiter{
    height:600px;
   width:600px;
   border:2px solid white;
   position:absolute;
   border-radius: 50%;
   animation:rotating 30s linear 0s infinite normal 
    
   
   


}
#p5{
    height:40px;
    width:40px;
    position: relative;
    top:170px;
    border-radius: 50%;
    background-image: url("https://img.freepik.com/premium-psd/jupiter-planet-isolated-transparent-background_220739-38853.jpg?w=360");
    background-size: cover;
    animation:spining 1s linear 0s infinite normal
}
#saturn{
    height:700px;
   width:700px;
   border:2px solid white;
   position:absolute;
   border-radius: 50%;
   animation:rotating 35s linear 0s infinite normal 
    
   
   


}
#p6{
    height:40px;
    width:40px;
    position: relative;
    top:180px;
    border-radius: 50%;
    background-image: url("https://png.pngtree.com/png-vector/20250808/ourlarge/pngtree-saturn-like-planet-isolated-on-transparent-background-png-image_16763222.webp");
    background-size: cover;
    animation:spining 1s linear 0s infinite normal 
}
@keyframes spining{
    from{
       rotate:0deg
    }
    to{
        rotate:360deg
    }
    
}
    </style>
</head>
<body>
   <div id="solar">
        <div id="sun"></div>
        <div id="mercury">
            <div id="p1"></div>
        </div>
        <div id="vinus">
            <div id="p2"></div>
        </div>
        <div id="earth">
            <div id="p3"></div>
        </div>
        <div id="mars">
            <div id="p4"></div>
        </div>
        <div id="jupiter">
            <div id="p5"></div>
        </div>
        <div id="saturn">
            <div id="p6"></div>
        </div>
    </div>
</body>
</html>
