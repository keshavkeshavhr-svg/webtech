<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            height: 800px;
            border: 6px solid #d81313;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-image:url("https://i.pinimg.com/736x/7d/dc/bb/7ddcbb84586e93bac5baecb620a1fb33.jpg");
            background-size: cover;
            }
        #child1,#child2,#child3{
            height:200px;
            width: 200px;
            border: 2px solid black;
            border-radius:20%;
        }
        img{
            height:100%;
            width:100%;
            border-radius: 20%;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child1"><img src="https://img.theweek.in/content/dam/week/news/india/images/2018/6/23/namma-metro-pti.jpg"></div>
        <div id="child2"><img src="https://tse4.mm.bing.net/th/id/OIP.qn-JVhEGMjigu4u1O2CXjwHaHa?pid=Api&P=0&h=180"></div>
        <div id="child3"><img src="https://img.staticmb.com/mbcontent/images/uploads/2023/2/bangalore-namma-metro-COVER.jpg"></div>
    </div>
</body>
</html>
