<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
            padding: 0;
            margin: 0;
        }
        nav {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: gold;
        }
        #logoblack, #menublack {
            height: 100px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #menublack>a{
            color: black;
            text-decoration: none;
        }
        #logoblack img{
            height: 140px;
            mix-blend-mode: multiply;
        }
        #parant{
            height: 800px;
            background-color:powderblue;
            display: flex;
            justify-content:space-evenly;
            align-items: center;
        }
        #child1, #child2{
            height: 300px;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: multiply;
            border-radius: 20%;
            border-color: black;
        }
    </style>
</head>

<body>
    <nav>
        <div id="logoblack"><img src="https://tse3.mm.bing.net/th/id/OIP.CukDXSevfNa1B9Z7vMf7yQHaEK?pid=Api&P=0&h=180"></div>
        <div id="menublack" style="width: 600px;">
            <a href="">HOME</a>
            <a href="">ABOUT</a>
            <a href="">CONTACT</a>
            <a href="">LOGIN</a>
        </div>
    </nav>
    <div id="parant">
        <div id="child1">
            <img src="https://tse2.mm.bing.net/th/id/OIP.0H_GXDBmj8t95s1KzMU5GAHaL5?pid=Api&P=0&h=180">
        </div>
        <div id="child2">
            <img src="https://tse2.mm.bing.net/th/id/OIP.0H_GXDBmj8t95s1KzMU5GAHaL5?pid=Api&P=0&h=180">
    </div>
</body>
</html>
