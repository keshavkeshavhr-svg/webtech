<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        nav{
            height: 75px;
            display: flex;
            justify-content:center;
            align-items: center;
             background-color: black;
        }
        nav img{
            height: 70px;
        
        }
        #parent{
            display: flex;
            justify-content:space-evenly;
            align-items: center;
            height: 650px;
            border: 2px solid black;
            background-color: rgb(232, 223, 213);
        }
        #child1,#child2,#child3{
            height:300px;
            width:300px;
             background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius:10%;
            border: 2px solid black;
            

        }
       #child1 img,
       #child2 img,
       #child3 img{
        height: 250px;
        width: 250px;
        border-radius: 10%;
}
         input{
            height: 20px;
            width: 180px;
            border-radius: 10px;
            border: 1px solid black;
        }
         button{
            height: 20px;
            width: 100px;
            border-radius: 10px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <nav>
        <div>
            <img src="https://tse4.mm.bing.net/th/id/OIP.DmsasPuOfT7MxoGdkLkvHgHaCr?pid=Api&P=0&h=180">
        </div>
    </nav>
    <div id="parent">

            <div><input type="text" placeholder="Enter km"></div>

        </div>
                <div id="child2">
            <div><img src="https://tse1.mm.bing.net/th/id/OIP.L0_CDiYftUFF_SzrFizJ1wHaE8?pid=Api&P=0&h=180"></div>
            <div><input type="text" placeholder="Enter km"></div>
            <div><button style="background-color: black;color: white;">Book Now</button></div>
        </div>

            <div><input type="text" placeholder="Enter km"></div>
            <div><button style="background-color: black;color: white;">Book Now</button></div>
        </div>

    </div>

</html>
